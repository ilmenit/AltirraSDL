plugins {
    id 'com.android.application'
}

android {
    namespace 'org.altirra.app'
    compileSdk 36
    ndkVersion '28.2.13676358'

    // Override the default debug signing config to use a stable,
    // repo-committed keystore instead of AGP's auto-generated
    // ~/.android/debug.keystore.
    //
    // AGP's default keystore is machine-local and fresh on every CI
    // runner, so every GitHub Actions build used to produce an APK
    // with a different signer — installing a new nightly over the
    // previous one would then fail with INSTALL_FAILED_UPDATE_INCOMPATIBLE
    // ("Update failed / package signatures do not match") and force
    // the user to uninstall first.  Committing a single well-known
    // debug keystore (android/app/debug.keystore) makes every build
    // across every machine and every CI run share the same signer,
    // so `adb install -r` and sideloaded nightly updates keep working.
    //
    // This is a *debug* keystore — the credentials are intentionally
    // public and hard-coded.  Do NOT use it to sign Play Store
    // releases; it is a developer convenience equivalent to AGP's
    // own debug keystore, which ships with the same public password
    // ("android") across every Android Studio install.
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'altirra-debug'
            keyAlias 'altirra'
            keyPassword 'altirra-debug'
        }
    }

    defaultConfig {
        applicationId "org.altirra.app"
        minSdk 24           // Android 7.0 — covers 99%+ of active devices
        targetSdk 36
        versionCode 440
        versionName "4.40"

        // Note: `ndk.abiFilters` would conflict with `splits.abi`
        // below.  When ABI splits are enabled, splits.abi.include is
        // the authoritative ABI list — Gradle errors out on the
        // overlap if both are specified.

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared",
                          "-DALTIRRA_SDL3=ON",
                          "-DENABLE_LIBRASHADER=OFF"
                // NDK Clang uses c++_shared by default for C++20 features
            }
        }
    }

    // Per-ABI APK splits: produce one APK per architecture instead of a
    // ~150 MB universal APK that bundles both .so payloads.  Each output
    // gets a unique versionCode so Google Play / sideload upgrades pick
    // the higher-arch (arm64) variant when both happen to be installed.
    splits {
        abi {
            enable true
            reset()
            include 'arm64-v8a', 'armeabi-v7a'
            universalApk false
        }
    }

    buildTypes {
        debug {
            debuggable true
            jniDebuggable true
            // Explicit for clarity — matches the default, but makes it
            // obvious that debug uses the project-owned keystore (the
            // signingConfigs.debug override above redirects it away
            // from AGP's machine-local ~/.android/debug.keystore).
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
            // Sign release builds with the same project-owned keystore
            // as debug so both variants share a signer and can upgrade
            // each other on-device without requiring an uninstall.
            signingConfig signingConfigs.debug
        }
    }

    externalNativeBuild {
        cmake {
            // Point at the project root CMakeLists.txt
            path "../../CMakeLists.txt"
            version "3.24.0+"
        }
    }

    // SDL3 uses Java sources for the Android activity layer.
    // The SDLActivity.java (and related files) are fetched by CMake
    // FetchContent alongside the SDL3 native library, so we add the
    // SDL3 Java source directory dynamically.
    //
    // If SDL3 is installed as a system package (rare on Android), the
    // Java files are in the SDL3 source tree. For FetchContent builds,
    // they end up in the CMake build directory under _deps/sdl3-src/.
    //
    // We handle both paths: the build script sets SDL3_JAVA_DIR as a
    // Gradle property if needed.
    sourceSets {
        main {
            java.srcDirs += ['src/main/java']
            // SDL3 Java sources are added by the build script via
            // a gradle property or symlink — see android/setup_sdl3.sh
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // Don't compress assets — SDL3 needs raw access
    androidResources {
        noCompress 'xex', 'atr', 'car', 'cas', 'rom', 'bin'
    }

    lint {
        abortOnError false
    }
}

// Per-split versionCode override: when both APKs end up in the same
// release listing (e.g. via sideloading), the package manager refuses
// to install one over the other if the versionCode is identical.
// Stamp arm64-v8a > armeabi-v7a so an arm64 device that picked up the
// v7a slice can still upgrade cleanly to the 64-bit one.
//
// AGP 9.x removed the legacy `android.applicationVariants` DSL —
// versionCode lives on the new `androidComponents` Variant API.
androidComponents {
    onVariants(selector().withBuildType("release")) { variant ->
        variant.outputs.each { output ->
            def abiFilter = output.filters.find { f ->
                f.filterType.toString() == 'ABI'
            }
            if (abiFilter != null) {
                def abi = abiFilter.identifier
                def abiCode = ['armeabi-v7a': 1, 'arm64-v8a': 2][abi]
                if (abiCode != null) {
                    output.versionCode.set(abiCode * 1000 + 440)
                }
            }
        }
    }
}

dependencies {
    // No external Java dependencies — pure native SDL3 app
}
