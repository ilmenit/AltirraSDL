name: macOS build

# Builds AltirraSDL for macOS using the macos-release CMake preset and the
# existing build.sh / package.sh pipeline. SDL3 is linked statically into
# the AltirraSDL Mach-O binary by default (ALTIRRA_STATIC_SDL3=ON), so the
# .app bundle contains just AltirraSDL + librashader.dylib (bundled inside
# Contents/MacOS/ for @executable_path resolution + ad-hoc codesign).
#
# arm64 only: GitHub deprecated the macos-13 (Intel) runner image and
# new jobs scheduled to it are cancelled at queue time.  Apple Silicon
# is the present and future of macOS, and the matrix-of-one structure
# is preserved so a future x86_64/universal artifact can be added back
# deliberately if GitHub provides a suitable runner again.
#
# The runner OS is intentionally newer than the deployment target.  CI
# builds on the current macOS image, while CMake + Cargo are pinned to
# MACOSX_DEPLOYMENT_TARGET=11.0 and the packaged Mach-O binaries are
# verified with otool before upload.
#
# The outputs are:
#   - AltirraSDL-<ver>-macos-arm64.zip  (portable archive)
#   - AltirraSDL-<ver>-macos-arm64.dmg  (drag-to-Applications disk image)
# Both contain the same AltirraSDL.app bundle (Info.plist +
# NSGameControllerUsageDescription, ad-hoc codesigned so
# GameController.framework will enumerate USB / Bluetooth / MFi /
# Xbox / DualShock / DualSense pads).  Users still see the standard
# Gatekeeper "unidentified developer" prompt on first launch
# (right-click → Open to bypass).  The DMG is produced by hdiutil
# from scripts/build/package.sh after the zip step, from the exact
# same $PKG_DIR contents, so the two archives are interchangeable.
#
# Triggers:
#   - push to main       → updates the rolling "nightly" prerelease
#   - push of vX.Y.Z tag → adds both zips to the versioned release
#   - pull_request       → just builds + uploads artifacts
#   - workflow_dispatch  → manual

on:
  push:
    branches: [main, net-play]
    tags: ['v*']
  pull_request:
    branches: [main, net-play]
  workflow_dispatch:

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos:
    name: Build macOS zip (${{ matrix.arch }})
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain versions
        run: |
          cmake --version
          clang --version
          uname -m
          # macOS runners ship CMake well above the 3.24 floor and the
          # macos-release preset uses the default generator (Unix Makefiles)
          # so no extra build tools are needed.

      # Cache the FetchContent _deps tree (SDL3 source + intermediate
      # objects).  Keyed by arch so the two matrix jobs don't collide,
      # and by top-level CMake files so a CMake change invalidates.
      - name: Cache FetchContent _deps
        uses: actions/cache@v4
        with:
          path: build/macos-release/_deps
          key: macos-${{ matrix.arch }}-deps-macos11-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'src/AltirraSDL/CMakeLists.txt') }}
          restore-keys: |
            macos-${{ matrix.arch }}-deps-macos11-

      # Cache cargo's crate registry (shared across both matrix arches —
      # the index/cache is just downloaded crate metadata, not arch-
      # specific objects).  The compiled artifacts live in the
      # librashader-src cache below, which IS keyed per-arch.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
          key: macos-cargo-${{ hashFiles('scripts/build/librashader.sh') }}
          restore-keys: |
            macos-cargo-

      # Per-arch cache for the librashader source clone and its cargo
      # target/optimized/ directory (the .dylib plus all intermediate
      # object files).  Lives at the project-root build/_deps/, outside
      # the per-preset BUILD_DIR.
      - name: Cache librashader source + build
        uses: actions/cache@v4
        with:
          path: build/_deps/librashader-src
          key: macos-${{ matrix.arch }}-librashader-macos11-${{ hashFiles('scripts/build/librashader.sh') }}
          restore-keys: |
            macos-${{ matrix.arch }}-librashader-macos11-

      - name: Show Rust toolchain
        run: |
          # macOS runners ship with rustup + stable cargo preinstalled.
          rustup --version || true
          cargo --version || true
          rustc --version || true

      - name: Build, librashader, and package
        run: |
          set -e
          chmod +x ./build.sh ./scripts/build/*.sh
          # Strict on macOS — if librashader fails to build we want to
          # know loudly, since the .app bundle is the user-facing
          # artifact and "shaders silently missing" is a bad surprise.
          ./build.sh --release --librashader --package

      - name: Rename + verify zip and dmg
        run: |
          set -e

          version_le() {
            awk -v a="$1" -v b="$2" '
              BEGIN {
                split(a, A, ".")
                split(b, B, ".")
                for (i = 1; i <= 3; ++i) {
                  x = A[i] + 0
                  y = B[i] + 0
                  if (x < y) exit 0
                  if (x > y) exit 1
                }
                exit 0
              }'
          }

          macho_minos() {
            otool -l "$1" | awk '
              $1 == "cmd" && $2 == "LC_BUILD_VERSION" { in_build = 1; next }
              in_build && $1 == "minos" { print $2; exit }
              in_build && $1 == "cmd" { in_build = 0 }
            '
          }

          verify_macos_minos() {
            local file="$1"
            local minos

            minos="$(macho_minos "$file")"
            if [ -z "$minos" ]; then
              echo "ERROR: could not read LC_BUILD_VERSION minos from $file"
              otool -l "$file" || true
              exit 1
            fi

            echo "Mach-O minos: $file -> $minos"
            if ! version_le "$minos" "$MACOSX_DEPLOYMENT_TARGET"; then
              echo "ERROR: $file requires macOS $minos; expected <= $MACOSX_DEPLOYMENT_TARGET"
              exit 1
            fi
          }

          verify_packaged_app_minos() {
            local app="$1"

            verify_macos_minos "$app/Contents/MacOS/AltirraSDL"
            find "$app/Contents/MacOS" -maxdepth 1 -type f -name '*.dylib' -print |
              while IFS= read -r dylib; do
                verify_macos_minos "$dylib"
              done
          }

          # ── Rename zip ────────────────────────────────────────────────
          ORIG_ZIP=$(ls build/macos-release/AltirraSDL-*-macos.zip | head -1)
          echo "Produced zip: $ORIG_ZIP"
          ZIP_BASE=$(basename "$ORIG_ZIP" .zip)
          NEW_ZIP="build/macos-release/${ZIP_BASE}-${{ matrix.arch }}.zip"
          mv "$ORIG_ZIP" "$NEW_ZIP"
          echo "Renamed zip to: $NEW_ZIP"
          ls -lh "$NEW_ZIP"

          # ── Rename dmg (produced by package.sh hdiutil step) ──────────
          ORIG_DMG=$(ls build/macos-release/AltirraSDL-*-macos.dmg | head -1)
          echo "Produced dmg: $ORIG_DMG"
          DMG_BASE=$(basename "$ORIG_DMG" .dmg)
          NEW_DMG="build/macos-release/${DMG_BASE}-${{ matrix.arch }}.dmg"
          mv "$ORIG_DMG" "$NEW_DMG"
          echo "Renamed dmg to: $NEW_DMG"
          ls -lh "$NEW_DMG"

          # ── Verify zip contents (self-contained .app bundle) ─────────
          # macOS runners do have `unzip`, but cmake -E tar is more portable.
          LISTING=$(cmake -E tar tf "$NEW_ZIP")
          echo "$LISTING"
          echo "$LISTING" | grep -qE 'AltirraSDL\.app/Contents/MacOS/AltirraSDL$' \
            || { echo "ERROR: AltirraSDL.app bundle missing from zip"; exit 1; }
          echo "$LISTING" | grep -qE 'AltirraSDL\.app/Contents/Info\.plist$' \
            || { echo "ERROR: Info.plist missing from .app bundle"; exit 1; }
          # Bundle icon (.icns) must be present in Contents/Resources
          # or Finder/Launchpad/Dock-before-launch will show the
          # generic app placeholder instead of the Altirra icon.
          echo "$LISTING" | grep -qE 'AltirraSDL\.app/Contents/Resources/altirra\.icns$' \
            || { echo "ERROR: altirra.icns missing from .app bundle"; exit 1; }
          # SDL3 and SDL3_image are linked statically into the AltirraSDL
          # binary by default, so no libSDL3*.dylib should ship inside the
          # bundle.  Flag a warning (not a failure) if one is present —
          # that means the build fell back to shared SDL3, which still
          # works but produces a larger artifact.
          if echo "$LISTING" | grep -qE 'AltirraSDL\.app/Contents/MacOS/libSDL3.*\.dylib$'; then
            echo "::warning title=SDL3::libSDL3*.dylib present in .app bundle — expected static build (ALTIRRA_STATIC_SDL3=ON)"
          else
            echo "OK: no libSDL3*.dylib in bundle (SDL3 linked statically into AltirraSDL)"
          fi
          # librashader.dylib must live INSIDE the .app bundle so that
          # @executable_path resolves it at runtime and the ad-hoc
          # codesign step covers it.  Strict check — fail loudly if it's
          # missing or in the wrong place.
          echo "$LISTING" | grep -qE 'AltirraSDL\.app/Contents/MacOS/librashader.*\.dylib$' \
            || { echo "ERROR: librashader.dylib missing from .app bundle"; exit 1; }

          # Extract the zip into a temporary directory and verify the
          # actual Mach-O deployment target recorded in every bundled
          # executable/dylib. The Info.plist value alone is not enough:
          # dyld enforces LC_BUILD_VERSION minos at launch.
          ZIP_VERIFY_DIR=$(mktemp -d)
          trap "rm -rf '$ZIP_VERIFY_DIR' 2>/dev/null || true" EXIT
          ditto -x -k "$NEW_ZIP" "$ZIP_VERIFY_DIR"
          verify_packaged_app_minos "$ZIP_VERIFY_DIR/AltirraSDL.app"
          rm -rf "$ZIP_VERIFY_DIR"
          trap - EXIT

          # ── Verify dmg is mountable and contains the .app ────────────
          # Attach read-only, nobrowse so it doesn't pop in Finder, then
          # check for the Mach-O binary inside the bundle, then detach.
          # A broken DMG would fail hdiutil attach and exit non-zero.
          #
          # Trap is installed BEFORE hdiutil attach (with `|| true` so
          # the trap itself never fails) so that an attach failure still
          # runs detach cleanup on the (possibly partially-attached)
          # mountpoint, and set -e still propagates the original error.
          MOUNT_DIR=$(mktemp -d)
          trap "hdiutil detach '$MOUNT_DIR' -quiet >/dev/null 2>&1 || true; rm -rf '$MOUNT_DIR' 2>/dev/null || true" EXIT
          hdiutil attach "$NEW_DMG" -readonly -nobrowse -noautoopen \
                  -mountpoint "$MOUNT_DIR" >/dev/null
          test -x "$MOUNT_DIR/AltirraSDL.app/Contents/MacOS/AltirraSDL" \
            || { echo "ERROR: DMG is missing the AltirraSDL.app executable"; exit 1; }
          # SDL3 is linked statically by default — no libSDL3.dylib to check.
          # (Left as a warning rather than a hard failure so shared-SDL3
          # builds via -DALTIRRA_STATIC_SDL3=OFF still pass CI.)
          test -f "$MOUNT_DIR/AltirraSDL.app/Contents/Resources/altirra.icns" \
            || { echo "ERROR: DMG is missing altirra.icns inside the bundle"; exit 1; }
          # And sanity-check that Info.plist actually references the
          # icon file — empty CFBundleIconFile falls back to generic.
          grep -q 'altirra\.icns' "$MOUNT_DIR/AltirraSDL.app/Contents/Info.plist" \
            || { echo "ERROR: Info.plist CFBundleIconFile does not reference altirra.icns"; exit 1; }
          verify_packaged_app_minos "$MOUNT_DIR/AltirraSDL.app"
          hdiutil detach "$MOUNT_DIR" -quiet
          rm -rf "$MOUNT_DIR"
          trap - EXIT

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AltirraSDL-macos-${{ matrix.arch }}
          # Upload both the zip and the dmg as a single artifact so the
          # publish jobs below download one bundle and attach both files.
          path: |
            build/macos-release/AltirraSDL-*-macos-${{ matrix.arch }}.zip
            build/macos-release/AltirraSDL-*-macos-${{ matrix.arch }}.dmg
          if-no-files-found: error
          retention-days: 30

  publish-nightly:
    name: Attach to nightly release
    needs: macos
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AltirraSDL-macos-*
          path: dist
          merge-multiple: true

      # Force-move the rolling `nightly` tag to the commit that was just
      # built so GitHub regenerates the "Source code (zip/tar.gz)"
      # archives from the current `main`. Same-SHA idempotent across
      # workflows — see linux.yml for the full rationale.
      - name: Move nightly tag to current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" \
            -f "sha=${GITHUB_SHA}" -F "force=true" \
          || gh api --method POST \
               "repos/${GITHUB_REPOSITORY}/git/refs" \
               -f "ref=refs/tags/nightly" -f "sha=${GITHUB_SHA}"

      - name: Attach macOS zips + dmgs to rolling nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build"
          prerelease: true
          draft: false
          files: |
            dist/*.zip
            dist/*.dmg
          fail_on_unmatched_files: true

  publish-release:
    name: Attach to tagged release
    needs: macos
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AltirraSDL-macos-*
          path: dist
          merge-multiple: true

      - name: Attach macOS zips + dmgs to tagged release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            dist/*.zip
            dist/*.dmg
          fail_on_unmatched_files: true
