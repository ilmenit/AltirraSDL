name: Android build

# Builds AltirraSDL as two release Android APKs — one per ABI
# (arm64-v8a + armeabi-v7a) — using the self-contained Gradle project
# under android/ and the existing scripts/build/android.sh pipeline.
# Per-ABI APK splits are configured in android/app/build.gradle's
# `splits.abi` block so a single Gradle invocation produces both
# slices; sideload-friendly versionCodes (2440 for arm64, 1440 for v7a)
# guarantee an arm64 device can still upgrade cleanly if the user
# happened to install the v7a slice first.
#
# Each APK is signed with the bundled debug keystore so it is
# installable on any device with "Unknown sources" enabled (no Google
# Play upload key, no Play Store distribution).
#
# The mobile touch UI lives in src/AltirraSDL/source/ui/mobile/ and the
# Java SDLActivity shim is wired up by android/setup_sdl3.sh, which
# scripts/build/android.sh runs as needed.
#
# Triggers:
#   - push to main       → updates the rolling "nightly" prerelease
#   - push of vX.Y.Z tag → adds the APK to the versioned release
#   - pull_request       → just builds + uploads an artifact
#   - workflow_dispatch  → manual

on:
  push:
    branches: [main, net-play]
    tags: ['v*']
  pull_request:
    branches: [main, net-play]
  workflow_dispatch:

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  android:
    name: Build Android APKs (arm64-v8a + armeabi-v7a)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Cache Gradle's user dir, the SDL3 source clone (~tens of MB) that
      # scripts/build/android.sh fetches via android/setup_sdl3.sh, and the
      # Gradle native build tree (.cxx contains CMake configure output and
      # ninja build state for the SDL3 + AltirraSDL .so compilation).
      # The Android SDK itself lives outside $HOME on GH-hosted runners
      # (/usr/local/lib/android/sdk) and is preinstalled, so no SDK cache.
      - name: Cache Gradle + SDL3 source + native build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/SDL3
            android/app/.cxx
          key: android-${{ runner.os }}-${{ hashFiles('android/app/build.gradle', 'android/build.gradle', 'android/setup_sdl3.sh', 'scripts/build/android.sh', 'CMakeLists.txt', 'src/AltirraSDL/CMakeLists.txt') }}
          restore-keys: |
            android-${{ runner.os }}-

      - name: Build, sign, and locate APK
        shell: bash
        run: |
          set -e
          chmod +x ./build.sh ./scripts/build/*.sh
          ./build.sh --setup-android --android --release --sign

      - name: Rename APKs with version + arch
        shell: bash
        run: |
          set -e
          # Gradle's `splits.abi` block produces one APK per ABI under
          # the same release directory — app-arm64-v8a-release.apk and
          # app-armeabi-v7a-release.apk.  Find each by ABI suffix and
          # rename to the AltirraSDL-<ver>-android-<abi>.apk convention
          # that matches the Linux / macOS / Windows artifact pattern.
          APK_DIR="android/app/build/outputs/apk/release"
          if ! ls "$APK_DIR"/*.apk >/dev/null 2>&1; then
              echo "ERROR: no APKs found in $APK_DIR"
              find android/app/build/outputs/apk -type f -name '*.apk' || true
              exit 1
          fi
          echo "APKs in $APK_DIR:"
          ls -lh "$APK_DIR"/*.apk
          # Parse the version straight out of the top-level CMakeLists.txt
          # — no host CMake build runs in this job, so the AltirraSDL-<ver>
          # package directory used by package.sh on the other platforms
          # doesn't exist here.
          VERSION=$(sed -n 's/^project(Altirra VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt | head -1)
          if [ -z "$VERSION" ]; then
              echo "ERROR: could not parse version from CMakeLists.txt"
              exit 1
          fi
          OUT_DIR="build/android-release"
          mkdir -p "$OUT_DIR"
          for ABI in arm64-v8a armeabi-v7a; do
              SRC="$APK_DIR/app-${ABI}-release.apk"
              if [ ! -f "$SRC" ]; then
                  echo "ERROR: expected ABI APK missing: $SRC"
                  exit 1
              fi
              DST="$OUT_DIR/AltirraSDL-${VERSION}-android-${ABI}.apk"
              cp "$SRC" "$DST"
              echo "Renamed: $SRC -> $DST"
          done
          ls -lh "$OUT_DIR"/*.apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AltirraSDL-android
          path: build/android-release/AltirraSDL-*-android-*.apk
          if-no-files-found: error
          retention-days: 30

  publish-nightly:
    name: Attach to nightly release
    needs: android
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AltirraSDL-android
          path: dist

      # Wipe any previously-uploaded *.apk assets from the nightly release
      # so old per-commit builds (e.g. AltirraSDL-nightly-12-g9c2638d-*.apk
      # left over from before we pinned the filename to the project
      # version) don't accumulate.  softprops/action-gh-release replaces
      # files with the same name but never deletes orphans, so we do it
      # explicitly with the gh CLI.
      - name: Delete stale APK assets from nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          if gh release view nightly --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release view nightly --repo "$GITHUB_REPOSITORY" \
                  --json assets --jq '.assets[].name' \
                  | grep -E '\.apk$' \
                  | while read -r asset; do
                      echo "Deleting stale asset: $asset"
                      gh release delete-asset nightly "$asset" \
                          --repo "$GITHUB_REPOSITORY" --yes || true
                  done
          else
              echo "No existing nightly release; nothing to clean."
          fi

      # Force-move the rolling `nightly` tag to the commit that was just
      # built so GitHub regenerates the "Source code (zip/tar.gz)"
      # archives from the current `main`. Same-SHA idempotent across
      # workflows — see linux.yml for the full rationale.
      - name: Move nightly tag to current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" \
            -f "sha=${GITHUB_SHA}" -F "force=true" \
          || gh api --method POST \
               "repos/${GITHUB_REPOSITORY}/git/refs" \
               -f "ref=refs/tags/nightly" -f "sha=${GITHUB_SHA}"

      - name: Attach APK to rolling nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build"
          prerelease: true
          draft: false
          files: dist/*.apk
          fail_on_unmatched_files: true

  publish-release:
    name: Attach to tagged release
    needs: android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AltirraSDL-android
          path: dist

      - name: Attach APK to tagged release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: dist/*.apk
          fail_on_unmatched_files: true
