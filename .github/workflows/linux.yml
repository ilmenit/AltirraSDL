name: Linux build

# Builds AltirraSDL as a portable AppImage inside an ubuntu:22.04 container
# so the glibc floor is pinned to 2.35 (compatible with Debian 12, Ubuntu
# 22.04+, RHEL 9+, recent Fedora/Arch). SDL3 is linked statically into the
# binary by default (ALTIRRA_STATIC_SDL3=ON), so the AppImage contains
# just AltirraSDL + optional librashader.so plus the handful of libraries
# linuxdeploy picks up via ldd (libc / libstdc++ / libgcc_s / libm).
# X11/Wayland/PulseAudio/ALSA/libdecor are NOT bundled — SDL3 dlopens
# them at runtime, so they must exist on the target system; this is
# always true on a glibc-2.35+ desktop. librashader is built from source
# via Rust.
#
# Two architectures are built in parallel via a matrix:
#   - x86_64  on ubuntu-latest         (GitHub's standard x86_64 runner)
#   - aarch64 on ubuntu-22.04-arm      (GitHub's native arm64 runner, free
#                                       for public repos; no QEMU, no cross)
# Both use the same multi-arch ubuntu:22.04 container, so the glibc /
# libstdc++ floor is identical on both — which is what makes the aarch64
# AppImage run cleanly on Raspberry Pi OS Bookworm (Pi 4 / 5 / 500) and
# any other 64-bit ARM distro shipping glibc >= 2.35.
#
# Triggers:
#   - push to main       → updates the rolling "nightly" prerelease
#   - push of vX.Y.Z tag → creates a versioned GitHub Release
#   - pull_request       → just builds + uploads an artifact
#   - workflow_dispatch  → manual

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  appimage:
    name: Build AppImage (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-22.04-arm
    container:
      image: ubuntu:22.04
      # --privileged is not available in GHA containers, so the AppImage
      # build uses --appimage-extract-and-run rather than FUSE.
      options: --user root

    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential ninja-build git ca-certificates \
            curl wget file zip unzip xz-utils patch pkg-config \
            gnupg lsb-release software-properties-common \
            python3 \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxfixes-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libasound2-dev libpulse-dev libjack-jackd2-dev libpipewire-0.3-dev \
            libdbus-1-dev libudev-dev libibus-1.0-dev \
            libusb-1.0-0-dev \
            desktop-file-utils

          # CMakePresets.json declares "version": 5 which requires CMake
          # >= 3.24.  Ubuntu 22.04 ships 3.22, so pull a current CMake from
          # Kitware's APT repo to match the project's documented floor.
          wget -qO- https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main" \
            > /etc/apt/sources.list.d/kitware.list

          # gcc-12 from jammy-updates.  Ubuntu 22.04's default gcc is 11,
          # which doesn't support C++23 `if consteval` (used to be in
          # constexpr.h before the std::is_constant_evaluated() switch).
          # Even though the source no longer needs it, gcc-12 is still
          # required for full C++20/23 standard-library support — gcc-11's
          # libstdc++ has known constexpr math gaps that bite the
          # constexpr_assert tests in src/system.
          apt-get update
          apt-get install -y --no-install-recommends cmake gcc-12 g++-12
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
          cmake --version
          gcc --version
          g++ --version

          # Hard floor check. CMakePresets.json requires >= 3.24; if
          # Kitware's apt repo ever stops publishing for this arch and
          # we silently fall back to distro CMake 3.22, fail loudly
          # here instead of deep in the configure step.
          CMAKE_VER=$(cmake --version | awk 'NR==1{print $3}')
          CMAKE_MAJOR=${CMAKE_VER%%.*}
          CMAKE_MINOR=${CMAKE_VER#*.}; CMAKE_MINOR=${CMAKE_MINOR%%.*}
          if [ "$CMAKE_MAJOR" -lt 3 ] || { [ "$CMAKE_MAJOR" -eq 3 ] && [ "$CMAKE_MINOR" -lt 24 ]; }; then
            echo "ERROR: CMake $CMAKE_VER is below the 3.24 floor." >&2
            echo "  Kitware apt repo probably doesn't publish this arch." >&2
            exit 1
          fi

      - name: Install Rust (for librashader)
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The container runs as root and git >= 2.35 refuses to operate on
      # a repo owned by a different uid than the current process.
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache librashader source + target
        uses: actions/cache@v4
        with:
          path: build/_deps/librashader-src
          key: librashader-v0.10.1-${{ runner.os }}-${{ runner.arch }}

      - name: Build, package, and produce AppImage
        shell: bash
        run: |
          chmod +x ./build.sh ./scripts/build/*.sh
          ./build.sh --appimage

      - name: Inspect AppImage
        shell: bash
        run: |
          set -e
          APPIMAGE=$(ls build/linux/AltirraSDL-*-linux-${{ matrix.arch }}.AppImage | head -1)
          echo "Produced: $APPIMAGE"
          ls -lh "$APPIMAGE"
          "$APPIMAGE" --appimage-extract >/dev/null
          echo "=== bundled files ==="
          ls -l squashfs-root/usr/bin/ || true
          echo "=== ldd AltirraSDL ==="
          ldd squashfs-root/usr/bin/AltirraSDL | sed 's/^/  /' || true
          # SDL3 is linked statically by default — there is no libSDL3.so.0
          # file to verify.  Confirm instead that the binary is NOT
          # dynamically linked against libSDL3, which would mean the static
          # build silently regressed.
          if ldd squashfs-root/usr/bin/AltirraSDL 2>/dev/null | grep -q 'libSDL3'; then
            echo "  WARNING: AltirraSDL is dynamically linked against libSDL3 — expected static build"
            echo "           (Pass -DALTIRRA_STATIC_SDL3=OFF only if this was intentional.)"
          else
            echo "  libSDL3 is statically linked into AltirraSDL (expected)"
          fi
          if [ -f squashfs-root/usr/bin/librashader.so ]; then
            echo "  librashader.so bundled OK"
          else
            echo "  WARNING: librashader.so not bundled"
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: AltirraSDL-linux-${{ matrix.arch }}
          path: build/linux/AltirraSDL-*-linux-${{ matrix.arch }}.AppImage
          if-no-files-found: error
          retention-days: 30

  publish-nightly:
    name: Publish nightly release
    needs: appimage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AltirraSDL-linux-*
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh dist/

      # Force-move the rolling `nightly` tag to the commit that was just
      # built so GitHub regenerates the "Source code (zip/tar.gz)"
      # archives from the current `main`. Runs only after `appimage`
      # builds succeeded (see `needs:` above). `github.sha` is identical
      # across every workflow triggered by the same push, so concurrent
      # PATCHes from multiple workflows converge on the same target SHA
      # (idempotent, no race). PATCH updates the ref if it exists; the
      # POST fallback creates it on a first-ever run.
      - name: Move nightly tag to current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" \
            -f "sha=${GITHUB_SHA}" -F "force=true" \
          || gh api --method POST \
               "repos/${GITHUB_REPOSITORY}/git/refs" \
               -f "ref=refs/tags/nightly" -f "sha=${GITHUB_SHA}"

      - name: Update rolling nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build"
          prerelease: true
          draft: false
          body: |
            Rolling nightly build from `main`.

            Commit: `${{ github.sha }}`
            Built: ${{ github.run_id }}

            **Linux:** Download the `.AppImage` matching your CPU
            architecture, `chmod +x`, and run.

            | Architecture | File                                      | Targets |
            |--------------|-------------------------------------------|---------|
            | x86_64       | `AltirraSDL-*-linux-x86_64.AppImage`      | Intel / AMD 64-bit desktops & laptops |
            | aarch64      | `AltirraSDL-*-linux-aarch64.AppImage`     | Raspberry Pi 4 / 5 / 500 (64-bit OS), generic arm64 Linux |

            Requires glibc ≥ 2.35 (Ubuntu 22.04+, Debian 12+ /
            Raspberry Pi OS Bookworm+, Fedora 36+, RHEL 9+).

            ---

            ### Looking for headless / scripting?

            The **AltirraBridge** package — headless emulator binary,
            Python and C SDKs, full documentation, case studies, and
            a Claude Code skill for AI-driven Atari work — is built
            and released separately. See the
            [`nightly-bridge`](https://github.com/${{ github.repository }}/releases/tag/nightly-bridge)
            release for the latest rolling build, or look for the
            `AltirraBridge-*.tar.gz` asset attached to this release.
          files: dist/*.AppImage
          fail_on_unmatched_files: true

  publish-release:
    name: Publish tagged release
    needs: appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AltirraSDL-linux-*
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*.AppImage
          fail_on_unmatched_files: true
