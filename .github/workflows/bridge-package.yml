name: AltirraBridge package

# Builds the headless AltirraBridgeServer binary on Linux x86_64,
# macOS arm64, and Windows x86_64. For each platform, packages the
# binary together with the Python and C SDKs, the documentation,
# the examples (source AND compiled C example binaries), the case
# studies, and the Claude Code skill into a self-contained archive.
#
# This is independent from the main AltirraSDL releases: no GUI, no
# fonts, no librashader, no display layer, no input layer. Use this
# package for headless automation, CI testing, AI-driven gameplay,
# and reverse-engineering tooling.
#
# Triggers:
#   - push to main       → updates the rolling "nightly-bridge" prerelease
#   - push of vX.Y.Z tag → attaches all-platform packages to the tagged release
#   - pull_request       → builds + uploads artifacts (no release)
#   - workflow_dispatch  → manual

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'src/AltirraSDL/AltirraBridge/**'
      - 'src/AltirraSDL/source/bridge/**'
      - 'src/AltirraSDL/cmake/altirra_core_sources.cmake'
      - 'src/AltirraBridgeServer/**'
      - '.github/workflows/bridge-package.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ===========================================================================
# Linux x86_64
# ===========================================================================

jobs:
  linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      options: --user root

    steps:
      - name: Install build dependencies
        shell: bash
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          # Smaller dep set than the full AppImage build: bridge server
          # links SDL3 only for audio (with the dummy driver), no UI.
          # Mirror the apt set from .github/workflows/linux.yml (the
          # main SDL3 desktop build) so SDL3's FetchContent build
          # passes the same windowing-system feature checks.
          apt-get install -y --no-install-recommends \
            build-essential ninja-build git ca-certificates \
            curl wget file zip unzip xz-utils patch pkg-config \
            gnupg lsb-release software-properties-common \
            python3 python3-venv \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxi-dev libxfixes-dev libxss-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libasound2-dev libpulse-dev libjack-jackd2-dev libpipewire-0.3-dev \
            libdbus-1-dev libudev-dev libibus-1.0-dev \
            libusb-1.0-0-dev desktop-file-utils \
            tar gzip
          # CMake >= 3.24 + gcc-12.
          wget -qO- https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor -o /usr/share/keyrings/kitware-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/kitware-archive-keyring.gpg] https://apt.kitware.com/ubuntu/ jammy main" \
            > /etc/apt/sources.list.d/kitware.list
          apt-get update
          apt-get install -y --no-install-recommends cmake gcc-12 g++-12
          update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100
          update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100

      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure
        shell: bash
        run: |
          # SDL_UNIX_CONSOLE_BUILD=ON disables SDL3's "must have a
          # windowing system" assertion. The bridge server is
          # headless; 04_paint gets built but never executed in CI,
          # so a pure-console SDL3 build is acceptable and keeps
          # FetchContent from erroring out if any single X11 dev
          # sub-package's version check trips SDL3's feature probes.
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DALTIRRA_BRIDGE_SERVER=ON \
            -DSDL_UNIX_CONSOLE_BUILD=ON

      - name: Build AltirraBridgeServer
        shell: bash
        run: cmake --build build --target AltirraBridgeServer -j"$(nproc)"

      - name: Build C example binaries
        shell: bash
        run: |
          # 04_paint links SDL3. The bridge build above already
          # FetchContents and builds SDL3 into build/_deps/sdl3-build
          # — point find_package at it via CMAKE_PREFIX_PATH so we
          # reuse the same SDL3 instead of fetching twice.
          SDL3_HINT=""
          if [ -d build/_deps/sdl3-build ]; then
              SDL3_HINT="-DCMAKE_PREFIX_PATH=$PWD/build/_deps/sdl3-build"
          fi
          cmake -S src/AltirraSDL/AltirraBridge/sdk/c/examples \
                -B build_c_examples -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                $SDL3_HINT
          cmake --build build_c_examples -j"$(nproc)"
          ls -lh build_c_examples/01_ping build_c_examples/02_peek_regs \
                 build_c_examples/03_input build_c_examples/04_paint

      - name: Smoke test bridge + Python SDK + C example
        shell: bash
        timeout-minutes: 5
        run: |
          set -e
          ./build/src/AltirraBridgeServer/AltirraBridgeServer \
            --bridge=tcp:127.0.0.1:0 >/tmp/brs.log 2>&1 &
          BPID=$!
          # Wait up to 30s for the token-file line, checking every 1s
          # and bailing if the process died.
          TOKFILE=""
          for i in $(seq 1 30); do
            sleep 1
            if ! kill -0 $BPID 2>/dev/null; then
              echo "server exited before printing token-file"; cat /tmp/brs.log; exit 1
            fi
            TOKFILE=$(grep -oP 'token-file: \K\S+' /tmp/brs.log 2>/dev/null | head -1)
            [ -n "$TOKFILE" ] && break
          done
          if [ -z "$TOKFILE" ]; then
            cat /tmp/brs.log; kill -KILL $BPID 2>/dev/null || true; exit 1
          fi
          # Python SDK end-to-end. Set a default socket timeout so a
          # hung server can't wedge the step forever, and retry a few
          # times in case a localhost probe occupies the bridge's
          # single-client slot on the first attempt.
          BRIDGE_TOKFILE="$TOKFILE" \
          PYTHONPATH=src/AltirraSDL/AltirraBridge/sdk/python \
          python3 - <<'PY'
          import os, socket, time
          socket.setdefaulttimeout(10.0)
          from altirra_bridge import AltirraBridge, BridgeError
          last = None
          for attempt in range(5):
              try:
                  with AltirraBridge.from_token_file(os.environ['BRIDGE_TOKFILE']) as a:
                      assert a.ping()['ok']
                      a.frame(20)
                      png = a.screenshot()
                      assert png[:8] == b'\x89PNG\r\n\x1a\n'
                      insns = a.disasm(0xe477, 4)
                      assert 'COLDSV' in insns[0]['text']
                  print(f"python sdk OK (attempt {attempt+1})")
                  break
              except (BridgeError, ConnectionError, OSError) as e:
                  last = e
                  print(f"attempt {attempt+1} failed: {e!r}")
                  time.sleep(1)
          else:
              raise SystemExit(f"python smoke failed after retries: {last!r}")
          PY
          # C example (uses the same token file)
          ./build_c_examples/01_ping "${TOKFILE}" || { echo "C ping failed"; cat /tmp/brs.log; kill -KILL $BPID; exit 1; }
          echo "c example OK"
          # Always print the server log on success too — cheap and
          # catches silent regressions.
          echo "===== brs.log ====="; cat /tmp/brs.log
          # Tear down the server. Unbounded `wait` has hung CI before;
          # SIGTERM + short sleep + SIGKILL is guaranteed to return.
          kill -TERM $BPID 2>/dev/null || true
          sleep 1
          kill -KILL $BPID 2>/dev/null || true

      - name: Stage package
        shell: bash
        run: |
          set -e
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${{ github.ref_name }}"
          else
            VER="$(git rev-parse --short HEAD)"
          fi
          NAME="AltirraBridge-${VER}-linux-x86_64"
          STAGE="staging/${NAME}"
          mkdir -p "${STAGE}"

          # Server binary, stripped
          cp build/src/AltirraBridgeServer/AltirraBridgeServer "${STAGE}/"
          strip "${STAGE}/AltirraBridgeServer" || true
          chmod +x "${STAGE}/AltirraBridgeServer"

          # SDKs, docs, examples, skill, README
          cp -a src/AltirraSDL/AltirraBridge/sdk      "${STAGE}/sdk"
          cp -a src/AltirraSDL/AltirraBridge/docs     "${STAGE}/docs"
          cp -a src/AltirraSDL/AltirraBridge/examples "${STAGE}/examples"
          cp -a src/AltirraSDL/AltirraBridge/skills   "${STAGE}/skills"
          cp -a src/AltirraSDL/AltirraBridge/README.md "${STAGE}/README.md" 2>/dev/null || true
          find "${STAGE}/sdk" -type d -name '__pycache__' -prune -exec rm -rf {} + 2>/dev/null || true
          find "${STAGE}/sdk" -type f -name '*.pyc' -delete

          # Compiled C examples
          mkdir -p "${STAGE}/sdk/c/examples/bin"
          for ex in 01_ping 02_peek_regs 03_input 04_paint; do
              cp "build_c_examples/${ex}" "${STAGE}/sdk/c/examples/bin/"
          done
          # Bundle libSDL3.so* alongside 04_paint. The CMakeLists
          # set RPATH=$ORIGIN on the binary, so the loader looks
          # here first before falling back to the system.
          if compgen -G "build/_deps/sdl3-build/libSDL3.so*" > /dev/null; then
              cp -P build/_deps/sdl3-build/libSDL3.so* "${STAGE}/sdk/c/examples/bin/"
          fi
          strip "${STAGE}/sdk/c/examples/bin/"* 2>/dev/null || true
          chmod +x "${STAGE}/sdk/c/examples/bin/"* 2>/dev/null || true

          # Build receipt (minimal — all user-facing docs live in README.md)
          STAMP="$(date -u +%Y-%m-%d)"
          cat > "${STAGE}/BUILD-INFO.txt" <<EOF
          AltirraBridge ${VER} — Linux x86_64
          Built ${STAMP} from commit ${{ github.sha }}

          Requirements:
            - Linux x86_64, glibc >= 2.35
              (Ubuntu 22.04+, Debian 12+, Fedora 36+, RHEL 9+)
            - Python >= 3.9 for the Python SDK (stdlib only)

          See README.md for the full walkthrough and usage guide.
          EOF

          mkdir -p dist
          tar -C staging -czf "dist/${NAME}.tar.gz" "${NAME}"
          ls -lh "dist/${NAME}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: AltirraBridge-linux-x86_64
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ===========================================================================
  # macOS arm64 (Apple Silicon)
  # ===========================================================================

  macos:
    name: Build (macOS arm64)
    runs-on: macos-14

    steps:
      - name: Install Ninja and SDL3
        run: brew install ninja sdl3

      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: bridge-macos-arm64-deps-${{ hashFiles('CMakeLists.txt', 'src/AltirraSDL/CMakeLists.txt', 'src/AltirraBridgeServer/CMakeLists.txt') }}
          restore-keys: bridge-macos-arm64-deps-

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DALTIRRA_BRIDGE_SERVER=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build AltirraBridgeServer
        shell: bash
        run: cmake --build build --target AltirraBridgeServer -j"$(sysctl -n hw.ncpu)"

      - name: Build C example binaries
        shell: bash
        run: |
          # 04_paint links SDL3 (system install via brew above).
          cmake -S src/AltirraSDL/AltirraBridge/sdk/c/examples \
                -B build_c_examples -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build build_c_examples -j"$(sysctl -n hw.ncpu)"
          ls -lh build_c_examples/01_ping build_c_examples/02_peek_regs \
                 build_c_examples/03_input build_c_examples/04_paint

      - name: Smoke test
        shell: bash
        timeout-minutes: 5
        run: |
          set -e
          ./build/src/AltirraBridgeServer/AltirraBridgeServer \
            --bridge=tcp:127.0.0.1:0 >/tmp/brs.log 2>&1 &
          BPID=$!
          # Wait up to 30s for the token-file line, bailing if the
          # server died. macOS Ventura+ occasionally takes longer than
          # 2s to bind + write the token file on first cold run.
          TOKFILE=""
          for i in $(seq 1 30); do
            sleep 1
            if ! kill -0 $BPID 2>/dev/null; then
              echo "server exited before printing token-file"; cat /tmp/brs.log; exit 1
            fi
            TOKFILE=$(grep -E 'token-file: ' /tmp/brs.log 2>/dev/null | sed 's/.*token-file: //' | head -1)
            [ -n "$TOKFILE" ] && break
          done
          if [ -z "$TOKFILE" ]; then
            cat /tmp/brs.log; kill -KILL $BPID 2>/dev/null || true; exit 1
          fi
          BRIDGE_TOKFILE="$TOKFILE" \
          PYTHONPATH=src/AltirraSDL/AltirraBridge/sdk/python \
          python3 - <<'PY'
          import os, socket, time
          socket.setdefaulttimeout(10.0)
          from altirra_bridge import AltirraBridge, BridgeError
          last = None
          for attempt in range(5):
              try:
                  with AltirraBridge.from_token_file(os.environ['BRIDGE_TOKFILE']) as a:
                      assert a.ping()['ok']
                      a.frame(20)
                      png = a.screenshot()
                      assert png[:8] == b'\x89PNG\r\n\x1a\n'
                      insns = a.disasm(0xe477, 4)
                      assert 'COLDSV' in insns[0]['text']
                  print(f"python sdk OK (attempt {attempt+1})")
                  break
              except (BridgeError, ConnectionError, OSError) as e:
                  last = e
                  print(f"attempt {attempt+1} failed: {e!r}")
                  time.sleep(1)
          else:
              raise SystemExit(f"python smoke failed after retries: {last!r}")
          PY
          ./build_c_examples/01_ping "${TOKFILE}" || { echo "C ping failed"; cat /tmp/brs.log; kill -KILL $BPID; exit 1; }
          echo "c example OK"
          echo "===== brs.log ====="; cat /tmp/brs.log
          # Bounded kill; see Linux smoke test for rationale.
          kill -TERM $BPID 2>/dev/null || true
          sleep 1
          kill -KILL $BPID 2>/dev/null || true

      - name: Stage package
        shell: bash
        run: |
          set -e
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${{ github.ref_name }}"
          else
            VER="$(git rev-parse --short HEAD)"
          fi
          NAME="AltirraBridge-${VER}-macos-arm64"
          STAGE="staging/${NAME}"
          mkdir -p "${STAGE}"

          cp build/src/AltirraBridgeServer/AltirraBridgeServer "${STAGE}/"
          strip "${STAGE}/AltirraBridgeServer" || true
          chmod +x "${STAGE}/AltirraBridgeServer"

          cp -a src/AltirraSDL/AltirraBridge/sdk      "${STAGE}/sdk"
          cp -a src/AltirraSDL/AltirraBridge/docs     "${STAGE}/docs"
          cp -a src/AltirraSDL/AltirraBridge/examples "${STAGE}/examples"
          cp -a src/AltirraSDL/AltirraBridge/skills   "${STAGE}/skills"
          cp -a src/AltirraSDL/AltirraBridge/README.md "${STAGE}/README.md" 2>/dev/null || true
          find "${STAGE}/sdk" -type d -name '__pycache__' -prune -exec rm -rf {} + 2>/dev/null || true
          find "${STAGE}/sdk" -type f -name '*.pyc' -delete

          mkdir -p "${STAGE}/sdk/c/examples/bin"
          for ex in 01_ping 02_peek_regs 03_input 04_paint; do
              cp "build_c_examples/${ex}" "${STAGE}/sdk/c/examples/bin/"
          done
          # Bundle the brew SDL3 dylib next to 04_paint and rewrite
          # its install_name to @loader_path so the loader picks
          # the bundled copy without a system SDL3 install.
          BREW_SDL3_LIB="$(brew --prefix sdl3)/lib"
          if [ -e "${BREW_SDL3_LIB}/libSDL3.0.dylib" ]; then
              cp -L "${BREW_SDL3_LIB}/libSDL3.0.dylib" \
                    "${STAGE}/sdk/c/examples/bin/libSDL3.0.dylib"
              # Find the original install_name the binary points at
              # (looks like /opt/homebrew/opt/sdl3/lib/libSDL3.0.dylib)
              # and rewrite it.
              ORIG_REF="$(otool -L "${STAGE}/sdk/c/examples/bin/04_paint" \
                          | awk '/libSDL3/ {print $1; exit}')"
              if [ -n "${ORIG_REF}" ]; then
                  install_name_tool -change "${ORIG_REF}" \
                      "@loader_path/libSDL3.0.dylib" \
                      "${STAGE}/sdk/c/examples/bin/04_paint"
              fi
              # Also fix the dylib's own id so it doesn't drag in
              # the absolute brew path.
              install_name_tool -id "@loader_path/libSDL3.0.dylib" \
                  "${STAGE}/sdk/c/examples/bin/libSDL3.0.dylib"
          fi
          strip "${STAGE}/sdk/c/examples/bin/"* 2>/dev/null || true
          chmod +x "${STAGE}/sdk/c/examples/bin/"* 2>/dev/null || true

          STAMP="$(date -u +%Y-%m-%d)"
          cat > "${STAGE}/BUILD-INFO.txt" <<EOF
          AltirraBridge ${VER} — macOS arm64
          Built ${STAMP} from commit ${{ github.sha }}

          Requirements:
            - macOS 11.0 (Big Sur) or later, Apple Silicon
            - Python >= 3.9 for the Python SDK (preinstalled on recent macOS)

          Gatekeeper note: the binary is unsigned. On first run, either
          right-click -> Open, or clear the quarantine attribute with:
            xattr -dr com.apple.quarantine AltirraBridgeServer

          See README.md for the full walkthrough and usage guide.
          EOF

          mkdir -p dist
          tar -C staging -czf "dist/${NAME}.tar.gz" "${NAME}"
          ls -lh "dist/${NAME}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: AltirraBridge-macos-arm64
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # ===========================================================================
  # Windows x86_64
  # ===========================================================================

  windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Cache CMake FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/windows-sdl-release/_deps
          key: bridge-windows-x86_64-deps-${{ hashFiles('CMakeLists.txt', 'src/AltirraSDL/CMakeLists.txt', 'src/AltirraBridgeServer/CMakeLists.txt') }}
          restore-keys: bridge-windows-x86_64-deps-

      - name: Configure
        shell: pwsh
        run: |
          # Use the same CMake preset the main Windows build uses
          # (.github/workflows/windows.yml). Overriding with
          # -DALTIRRA_BRIDGE_SERVER=ON adds the headless server
          # target alongside the regular AltirraSDL target. Rolling
          # our own cmake invocation hit a Windows SDK 10.0.26100
          # <wchar.h> SIMD-intrinsic issue that the preset path
          # somehow avoids; rather than chase the diff, reuse the
          # known-working preset verbatim.
          cmake --preset windows-sdl-release `
            -DALTIRRA_BRIDGE_SERVER=ON

      - name: Build AltirraBridgeServer
        shell: pwsh
        run: |
          # Also build SDL3-shared so 04_paint has something to link
          # against. The bridge server itself doesn't need SDL3 (we
          # removed that dep), but 04_paint uses find_package(SDL3)
          # against the FetchContent'd build tree and expects the
          # .lib / .dll to actually exist.
          cmake --build build/windows-sdl-release `
              --target AltirraBridgeServer SDL3-shared `
              --config Release

      - name: Build C example binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # 04_paint links SDL3. SDL3Config.cmake is generated at the
          # ROOT of the FetchContent build dir (_deps/sdl3-build/),
          # NOT in the per-config Release/ subdir — Release/ only
          # holds the .lib/.dll. find_package(SDL3) needs the dir
          # with the Config files, which then resolves the per-config
          # imported target locations.
          $sdl3BuildDir = "$pwd\build\windows-sdl-release\_deps\sdl3-build"
          if (-not (Test-Path "$sdl3BuildDir\SDL3Config.cmake")) {
              throw "SDL3Config.cmake not found at $sdl3BuildDir — was SDL3-shared built in the previous step?"
          }
          cmake -S src/AltirraSDL/AltirraBridge/sdk/c/examples `
                -B build_c_examples -G "Visual Studio 17 2022" -A x64 `
                "-DCMAKE_PREFIX_PATH=$sdl3BuildDir"
          cmake --build build_c_examples --config Release
          # Get-ChildItem only takes one positional -Path; pass an
          # explicit array so all four binaries are listed (and the
          # step fails fast if any one is missing).
          Get-ChildItem -Path @(
              "build_c_examples\Release\01_ping.exe",
              "build_c_examples\Release\02_peek_regs.exe",
              "build_c_examples\Release\03_input.exe",
              "build_c_examples\Release\04_paint.exe"
          )

      - name: Smoke test
        shell: pwsh
        timeout-minutes: 5
        run: |
          $ErrorActionPreference = 'Stop'

          # Always-print-logs helper. Pass it $proc afterwards so we
          # also see whether the server process is still alive and,
          # if not, what its exit code was. Crucial for diagnosing
          # mid-handshake RST (server crash) on Windows.
          function Dump-ServerState($proc) {
              Write-Host "===== brs.log (stderr) ====="
              if (Test-Path "$env:TEMP\brs.log") {
                  Get-Content "$env:TEMP\brs.log" -Raw
              } else { Write-Host "(file missing)" }
              Write-Host "===== brs_stdout.log ====="
              if (Test-Path "$env:TEMP\brs_stdout.log") {
                  Get-Content "$env:TEMP\brs_stdout.log" -Raw
              } else { Write-Host "(file missing)" }
              if ($proc) {
                  if ($proc.HasExited) {
                      Write-Host "===== server PID $($proc.Id) HAS EXITED, code=$($proc.ExitCode) ====="
                  } else {
                      Write-Host "===== server PID $($proc.Id) still running ====="
                  }
              }
              Write-Host "==========================="
          }

          $proc = Start-Process -PassThru -NoNewWindow `
              -FilePath ".\build\windows-sdl-release\src\AltirraBridgeServer\Release\AltirraBridgeServer.exe" `
              -ArgumentList "--bridge=tcp:127.0.0.1:0" `
              -RedirectStandardError "$env:TEMP\brs.log" `
              -RedirectStandardOutput "$env:TEMP\brs_stdout.log"

          # Wait up to 30s for the token-file line to appear in the
          # server's stderr. Slow Windows runners take longer than 3s
          # to bind + write the file. Bail out fast if the process
          # has already died.
          $tokfile = $null
          for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              if ($proc.HasExited) {
                  Dump-ServerState $proc
                  throw "server exited before printing token-file (code=$($proc.ExitCode))"
              }
              if (Test-Path "$env:TEMP\brs.log") {
                  $log = Get-Content "$env:TEMP\brs.log" -Raw
                  if ($log -match 'token-file:\s*(\S+)') {
                      $tokfile = $Matches[1]
                      break
                  }
              }
          }
          if (-not $tokfile) {
              Dump-ServerState $proc
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              throw "timed out waiting for token-file in server log"
          }
          Write-Host "token file: $tokfile"

          $env:PYTHONPATH = "src/AltirraSDL/AltirraBridge/sdk/python"
          # Pass the token-file path via an environment variable so
          # Python doesn't try to parse Windows backslashes (e.g.
          # 'C:\Users\...') as Unicode escapes inside string literals.
          $env:BRIDGE_TOKFILE = $tokfile
          # The Python script retries from_token_file a few times.
          # On Windows CI runners, Windows Defender / SmartScreen may
          # probe the new loopback listener the instant it opens; the
          # bridge server evicts such silent probes as soon as the
          # next connection arrives, but a single-shot client can
          # still race and get an EOF on the first attempt.
          $py = @"
          import os, socket, time
          socket.setdefaulttimeout(10.0)
          from altirra_bridge import AltirraBridge, BridgeError
          last = None
          for attempt in range(5):
              try:
                  with AltirraBridge.from_token_file(os.environ['BRIDGE_TOKFILE']) as a:
                      assert a.ping()['ok']
                      a.frame(20)
                      png = a.screenshot()
                      assert png[:8] == b'\x89PNG\r\n\x1a\n'
                      insns = a.disasm(0xe477, 4)
                      assert 'COLDSV' in insns[0]['text']
                  print('python sdk OK (attempt', attempt + 1, ')')
                  break
              except (BridgeError, ConnectionError, OSError) as e:
                  last = e
                  print('attempt', attempt + 1, 'failed:', repr(e))
                  time.sleep(1)
          else:
              raise SystemExit('python smoke failed after retries: ' + repr(last))
          "@
          $py | python -
          if ($LASTEXITCODE -ne 0) {
              Dump-ServerState $proc
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              throw "python smoke failed (exit $LASTEXITCODE)"
          }

          .\build_c_examples\Release\01_ping.exe $tokfile
          if ($LASTEXITCODE -ne 0) {
              Dump-ServerState $proc
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
              throw "C ping failed (exit $LASTEXITCODE)"
          }
          Write-Host "c example OK"

          # Always show the server log for the success path too — small
          # cost, big gain when triaging unrelated regressions later.
          Dump-ServerState $proc
          if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Stage package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ('${{ github.ref_type }}' -eq 'tag') {
              $ver = '${{ github.ref_name }}'
          } else {
              $ver = (git rev-parse --short HEAD)
          }
          $name = "AltirraBridge-$ver-windows-x86_64"
          $stage = "staging\$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          Copy-Item build\windows-sdl-release\src\AltirraBridgeServer\Release\AltirraBridgeServer.exe $stage\
          Copy-Item -Recurse src\AltirraSDL\AltirraBridge\sdk      $stage\sdk
          Copy-Item -Recurse src\AltirraSDL\AltirraBridge\docs     $stage\docs
          Copy-Item -Recurse src\AltirraSDL\AltirraBridge\examples $stage\examples
          Copy-Item -Recurse src\AltirraSDL\AltirraBridge\skills   $stage\skills
          if (Test-Path src\AltirraSDL\AltirraBridge\README.md) {
              Copy-Item src\AltirraSDL\AltirraBridge\README.md $stage\README.md
          }
          # Strip __pycache__
          Get-ChildItem -Path $stage\sdk -Recurse -Directory -Filter __pycache__ |
              Remove-Item -Recurse -Force
          Get-ChildItem -Path $stage\sdk -Recurse -File -Filter *.pyc |
              Remove-Item -Force

          # Prebuilt C example binaries
          New-Item -ItemType Directory -Force -Path "$stage\sdk\c\examples\bin" | Out-Null
          foreach ($ex in '01_ping','02_peek_regs','03_input','04_paint') {
              Copy-Item "build_c_examples\Release\$ex.exe" "$stage\sdk\c\examples\bin\"
          }
          # Bundle SDL3.dll next to 04_paint.exe so the loader finds
          # it in the same directory (Windows DLL search order
          # always checks the executable directory first). With the
          # VS generator the DLL lands in a per-config subdirectory.
          $sdl3dll = @(
              "build\windows-sdl-release\_deps\sdl3-build\Release\SDL3.dll",
              "build\windows-sdl-release\_deps\sdl3-build\SDL3.dll"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($sdl3dll) {
              Copy-Item $sdl3dll "$stage\sdk\c\examples\bin\"
          }

          $stamp = (Get-Date -Format 'yyyy-MM-dd')
          $sha = '${{ github.sha }}'
          $body = @"
          AltirraBridge $ver - Windows x86_64
          Built $stamp from commit $sha

          Requirements:
            - Windows 10 / 11 x64
            - Microsoft Visual C++ Redistributable 2015-2022 (preinstalled
              on most Windows 10/11 systems)
            - Python >= 3.9 for the Python SDK

          See README.md for the full walkthrough and usage guide.
          "@
          Set-Content -Path "$stage\BUILD-INFO.txt" -Value $body -Encoding UTF8

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $stage -DestinationPath "dist\$name.zip"
          Get-Item "dist\$name.zip" | Format-List Length, Name

      - uses: actions/upload-artifact@v4
        with:
          name: AltirraBridge-windows-x86_64
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  # ===========================================================================
  # Publish — pulls all three platform artifacts and attaches them
  # ===========================================================================

  publish-nightly:
    name: Publish nightly bridge package
    needs: [linux, macos, windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Update rolling nightly bridge release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-bridge
          name: "AltirraBridge nightly"
          prerelease: true
          draft: false
          body: |
            Rolling nightly build of the **AltirraBridge** headless
            scripting package from `main`.

            Commit: `${{ github.sha }}`
            Built: ${{ github.run_id }}

            ## What this is

            A headless Atari 8-bit emulator + scripting bridge,
            packaged with Python and C client SDKs, full documentation,
            **prebuilt C example binaries**, RE case studies, and a
            Claude Code skill. **No GUI, no fonts, no librashader.**

            Use it for automation, CI testing, AI gameplay agents,
            and reverse-engineering tooling.

            ## Downloads

            | Platform        | File                                            |
            |-----------------|-------------------------------------------------|
            | Linux x86_64    | `AltirraBridge-*-linux-x86_64.tar.gz`           |
            | macOS arm64     | `AltirraBridge-*-macos-arm64.tar.gz`            |
            | Windows x86_64  | `AltirraBridge-*-windows-x86_64.zip`            |

            Each archive is fully self-contained: just unpack and run.

            ## Quick start

                # Linux / macOS
                tar xzf AltirraBridge-*-linux-x86_64.tar.gz
                cd AltirraBridge-*/
                ./AltirraBridgeServer --bridge=tcp:127.0.0.1:0
                # In another shell, run a prebuilt C example:
                ./sdk/c/examples/bin/01_ping /tmp/altirra-bridge-*.token

                # Windows
                Expand-Archive AltirraBridge-*-windows-x86_64.zip
                cd AltirraBridge-*/
                .\AltirraBridgeServer.exe --bridge=tcp:127.0.0.1:0

            See `README.md` inside each archive for the full usage
            guide, and `BUILD-INFO.txt` for the exact version / commit
            and per-platform install notes (macOS Gatekeeper, etc.).

            ## What this is NOT

            This package does not replace the regular AltirraSDL
            desktop builds. Those are still published separately as
            AppImage / DMG / installer / APK by the platform-specific
            workflows. Use those if you want the GUI emulator.
          files: |
            dist/*.tar.gz
            dist/*.zip
          fail_on_unmatched_files: true

  publish-release:
    name: Attach bridge package to tagged release
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            dist/*.tar.gz
            dist/*.zip
          fail_on_unmatched_files: true
