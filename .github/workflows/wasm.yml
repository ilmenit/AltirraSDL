name: WebAssembly build

# Builds AltirraSDL as a WebAssembly module via Emscripten, publishes the
# resulting browser bundle (index.html + AltirraSDL.js + AltirraSDL.wasm)
# as a GitHub Pages site at https://ilmenit.github.io/AltirraSDL/, and
# attaches a zipped copy to the rolling `nightly` GitHub Release so users
# can download and self-host.
#
# Architecture notes (see src/AltirraSDL/CMakeLists.txt for the
# authoritative details):
#
#   - Single-threaded: no -pthread / SharedArrayBuffer, which means the
#     site works on any plain static host (GitHub Pages, Netlify, S3
#     bucket, self-hosted Nginx) without COOP/COEP headers.
#   - Netplay, AltirraBridge, and librashader are forced OFF by the
#     CMake logic; they need infrastructure we cannot provide in-browser
#     (UDP sockets, OS-level scripting endpoints, external .so/.dylib).
#   - Rendering uses SDL_Renderer on WebGL2; the direct GL / ES3
#     display backend and imgui_impl_opengl3 are excluded because their
#     glXxx symbols clash with Emscripten's WebGL stubs at wasm-ld.
#   - Persistence is per-origin via IDBFS (Emscripten's IndexedDB-backed
#     filesystem).  User-uploaded games and firmware live under /persist
#     in the virtual filesystem and survive page reloads.
#
# Triggers:
#   - push to main       → rebuilds, updates GitHub Pages, updates `nightly`.
#   - push to net-play   → rebuilds and uploads artifact (no release).
#   - push to WASM-target → same (development branch for this port).
#   - push of vX.Y.Z tag → creates versioned release asset.
#   - pull_request       → builds and uploads artifact, no publish.
#   - workflow_dispatch  → manual re-run.

on:
  push:
    branches: [main, net-play, WASM-target]
    tags: ['v*']
  pull_request:
    branches: [main, net-play, WASM-target]
  workflow_dispatch:

# Cancel an in-progress run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege.  The publish-nightly and deploy-pages jobs
# below scope write permissions themselves.
permissions:
  contents: read

jobs:
  wasm:
    name: Build WebAssembly bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install the Emscripten SDK and activate the `latest` toolchain.
      # The `actions-cache-folder` key opts in to GitHub Actions caching,
      # so once the first CI run has populated the cache, subsequent runs
      # install in ~2 seconds instead of downloading ~400 MB of LLVM.
      # Pinning to a known-good tag keeps the build reproducible; bump
      # deliberately rather than silently chasing `latest`.
      # mymindstorm/setup-emsdk is a widely-used community action that
      # wraps the emsdk CLI.  Version is pinned to a release tested
      # against this branch; bump deliberately after local verification
      # (source ~/emsdk/emsdk_env.sh && emcc --version).  The action's
      # actions-cache-folder key opts in to GHA caching — once the
      # cache is populated, subsequent runs skip the ~400 MB download.
      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.6
          actions-cache-folder: emsdk-cache-5.0.6

      - name: Show toolchain versions
        run: |
          emcc --version | head -1
          cmake --version | head -1

      # Configure-time caching of SDL3 / SDL3_image FetchContent sources
      # keeps re-runs fast on cache hits.
      # Cache the FetchContent source trees — SDL3, SDL3_image, ImGui,
      # librashader headers, plus their configure-time intermediates.
      # Key on every top-level CMakeLists.txt so bumping a pinned tag
      # in any of them invalidates cleanly.  The cache is safe to share
      # across all WASM builds because the inputs pin toolchain + tags.
      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build/wasm-release/_deps
          key: wasm-fetchcontent-${{ hashFiles('CMakeLists.txt', 'src/**/CMakeLists.txt') }}
          restore-keys: |
            wasm-fetchcontent-

      - name: Configure wasm-release
        run: |
          cmake --preset wasm-release

      - name: Build wasm-release
        run: |
          cmake --build --preset wasm-release -j"$(nproc)"

      # Assemble the deployable payload.  Everything the browser needs is
      # a trio of files in the target directory; nothing else from the
      # build tree is required.
      - name: Stage distribution
        run: |
          set -e
          OUTDIR=build/wasm-release/src/AltirraSDL
          DIST=wasm-dist

          for f in index.html AltirraSDL.js AltirraSDL.wasm; do
            if [ ! -f "${OUTDIR}/${f}" ]; then
              echo "ERROR: missing expected build output ${OUTDIR}/${f}" >&2
              ls -l "${OUTDIR}" >&2 || true
              exit 1
            fi
          done

          mkdir -p "${DIST}"
          cp "${OUTDIR}/index.html"       "${DIST}/"
          cp "${OUTDIR}/AltirraSDL.js"    "${DIST}/"
          cp "${OUTDIR}/AltirraSDL.wasm"  "${DIST}/"

          # Size + byte-count smoke check — catch accidental zero-size
          # artifacts (empty .wasm has bitten us before on upstream CMake
          # bugs) before they are published as "working" builds.
          echo "=== distribution files ==="
          ls -lh "${DIST}"
          WASM_BYTES=$(wc -c < "${DIST}/AltirraSDL.wasm")
          JS_BYTES=$(wc -c   < "${DIST}/AltirraSDL.js")
          echo "wasm bytes: ${WASM_BYTES}"
          echo "js bytes:   ${JS_BYTES}"
          if [ "${WASM_BYTES}" -lt 100000 ] || [ "${JS_BYTES}" -lt 10000 ]; then
            echo "ERROR: build output suspiciously small, aborting publish." >&2
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          VER=$(grep -E '^project\(Altirra VERSION' CMakeLists.txt \
                  | sed -E 's/.*VERSION[[:space:]]+([0-9.]+).*/\1/')
          if [ -z "${VER}" ]; then VER="0.0.0"; fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Package WebAssembly zip
        run: |
          set -e
          VER=${{ steps.version.outputs.version }}
          ZIP=AltirraSDL-${VER}-wasm.zip
          (cd wasm-dist && zip -r -9 "../${ZIP}" . )
          ls -lh "${ZIP}"
          unzip -l "${ZIP}"
          echo "zipfile=${ZIP}" >> "$GITHUB_ENV"

      # Always upload a workflow artifact so PR authors can download and
      # test locally (`unzip`, `python3 -m http.server`) without having
      # to build emscripten themselves.
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AltirraSDL-wasm
          path: ${{ env.zipfile }}
          if-no-files-found: error
          retention-days: 30

      # Upload the raw deployment directory as a Pages artifact.  The
      # deploy-pages job below picks it up and publishes it live.  Only
      # uploaded on main pushes (to avoid racing with PR builds).
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: wasm-dist
          name: github-pages

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: wasm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # One-time setup required in repo Settings → Pages → Source:
      # GitHub Actions.  Without that, this step is a no-op but the
      # next step would still try to deploy and fail with a clear
      # "Pages site not yet created" message.
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-nightly:
    name: Attach to rolling nightly release
    needs: wasm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AltirraSDL-wasm
          path: dist

      - name: List downloaded artifacts
        run: ls -lh dist/

      # Move the rolling `nightly` tag to the current commit.  Same
      # pattern as linux.yml / windows.yml / macos.yml — this
      # converges idempotently when several platform jobs all PATCH
      # to the same SHA in parallel.
      - name: Move nightly tag to current commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/git/refs/tags/nightly" \
            -f "sha=${GITHUB_SHA}" -F "force=true" \
          || gh api --method POST \
               "repos/${GITHUB_REPOSITORY}/git/refs" \
               -f "ref=refs/tags/nightly" -f "sha=${GITHUB_SHA}"

      - name: Attach WebAssembly bundle to nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly build"
          prerelease: true
          draft: false
          # The release body is populated by the per-platform jobs; each
          # one just appends files.  softprops/action-gh-release is
          # file-level idempotent — re-uploading an already-attached
          # asset with the same name simply replaces it.
          files: dist/*.zip
          fail_on_unmatched_files: true

  publish-release:
    name: Attach to tagged release
    needs: wasm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: AltirraSDL-wasm
          path: dist

      - name: List downloaded artifacts
        run: ls -lh dist/

      - name: Attach to versioned release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*.zip
          fail_on_unmatched_files: true
